<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f2937, #111827);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px;
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            margin: 0;
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
        }

        .title {
            font-size: 36px;
            margin-top: 10px;
        }

        .message {
            font-size: 18px;
            color: #d1d5db;
            margin-top: 20px;
            line-height: 1.6;
        }

        .button-container {
            margin-top: 40px;
        }

        .home-button {
            display: inline-block;
            padding: 14px 28px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: background 0.2s ease;
        }

        .home-button:hover {
            background: #1d4ed8;
        }

        .subtle {
            margin-top: 50px;
            font-size: 13px;
            color: #9ca3af;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="icon">🛠️</div>

        <h1 class="error-code">404</h1>

        <h2 class="title">Page Not Found</h2>

        <p class="message">
            Either this page does not exist or is currently under development.
            <br><br>
            If you believe this is an error, please contact your system administrator
            or return to the provisioning portal homepage.
        </p>

        <div class="button-container">
            <a href="/" class="home-button">Return Home</a>
        </div>

        <div class="subtle">
            Internal Provisioning Portal
        </div>

    </div>

</body>
</html>
