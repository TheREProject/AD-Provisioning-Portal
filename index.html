<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provisioning Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 80%;
            max-width: 900px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        .card h2 {
            margin: 0;
            color: #2c3e50;
        }

        .card p {
            color: #777;
            margin-top: 10px;
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    Provisioning Portal
</header>

<div class="container">
    <div class="grid">

        <div class="card" onclick="goToOrg('JLU')">
            <h2>Justice League User Creation Form</h2>
            <p>User & Group Provisioning</p>
        </div>

        <div class="card" onclick="goToOrg('companyB')">
            <h2>Company B</h2>
            <p>User & Group Provisioning</p>
        </div>

        <div class="card" onclick="goToOrg('companyC')">
            <h2>Company C</h2>
            <p>User & Group Provisioning</p>
        </div>

    </div>
</div>

<footer>
    Internal IT Tooling
</footer>

<script>
    function goToOrg(org) {
        // Option 1: Static pages
        window.location.href = org + "/usercreation.html";

        // Option 2 (future): dynamic routing
        // window.location.href = "provision.html?org=" + org;
    }
</script>

</body>
</html>
